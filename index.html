<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Accurate Forklift - Brochure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, #2b2b2b 0%, #0a0a0a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  #book { width: 520px; height: 673px; margin: 0 auto; }
  .page {
    width: 520px; height: 673px;
    background-color: white;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .page img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  #hint {
    color: #ddd; font-size: 14px; margin-top: 14px; letter-spacing: 0.5px; opacity: 0.85;
  }
  #controls {
    margin-top: 10px; display: flex; gap: 14px;
  }
  #err { color: #f66; font-size: 13px; margin-top: 10px; max-width: 500px; text-align: center; white-space: pre-wrap; }
  button {
    background: #E31E24; color: white; border: none; padding: 8px 18px;
    border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:hover { background: #B0161B; }
</style>
</head>
<body>
  <div id="book">
    <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/a4bd278a-07df-4476-8e74-ba6642ff293c.jpeg" /></div>
    <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/6b55e218-bb62-43bb-aad2-fb17ddf35a6c.jpeg" /></div>
    <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/f2de269e-fe00-4f04-b8f3-d9ea995d0278.jpeg" /></div>
    <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/b860204d-6911-410e-945d-5fb4b645b818.jpeg" /></div>
    <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/743f5997-ebc2-49e1-a1f0-d9812e9a69a5.jpeg" /></div>
  </div>
  <div id="controls">
    <button id="prevBtn">‹ Prev</button>
    <button id="nextBtn">Next ›</button>
  </div>
  <div id="hint">Click the edge of a page, or drag it, to turn — like a real magazine</div>
  <div id="err"></div>

<script>
  function initBook() {
    try {
      const pageFlip = new St.PageFlip(document.getElementById('book'), {
        width: 520,
        height: 673,
        size: "fixed",
        minWidth: 280,
        maxWidth: 700,
        minHeight: 360,
        maxHeight: 900,
        showCover: false,
        usePortrait: true,
        maxShadowOpacity: 0.5,
        mobileScrollSupport: true,
        flippingTime: 700,
      });

      pageFlip.loadFromHTML(document.querySelectorAll('.page'));

      document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
      document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());
    } catch (e) {
      document.getElementById('err').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  }

  const imgs = Array.from(document.querySelectorAll('.page img'));
  let loaded = 0;
  function checkAllLoaded() {
    loaded++;
    if (loaded >= imgs.length) initBook();
  }
  imgs.forEach((img) => {
    if (img.complete) {
      checkAllLoaded();
    } else {
      img.addEventListener('load', checkAllLoaded);
      img.addEventListener('error', checkAllLoaded);
    }
  });
</script>
</body>
</html>
