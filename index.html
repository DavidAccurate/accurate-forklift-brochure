<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Accurate Forklift - Brochure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, #2b2b2b 0%, #0a0a0a 100%);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 22px;
    padding: 0 16px;
    box-sizing: border-box;
  }
  #book {
    margin: 0 auto;
    transition: width 0.35s ease, height 0.35s ease;
  }
  .page {
    background-color: white;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .page img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    pointer-events: none;
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  #hint {
    color: #ddd; font-size: 12.5px; line-height: 1.5; letter-spacing: 0.3px; opacity: 0.85;
    text-align: center; max-width: 130px;
  }
  #err { color: #f66; font-size: 13px; margin-top: 10px; max-width: 500px; text-align: center; white-space: pre-wrap; }
  button {
    background: #E31E24; color: white; border: none; padding: 10px 16px;
    border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px;
    letter-spacing: 0.5px;
    width: 110px;
  }
  button:hover { background: #B0161B; }
  button.secondary { background: #333; }
  button.secondary:hover { background: #555; }
  .divider { width: 60%; height: 1px; background: rgba(255,255,255,0.15); margin: 4px 0; }

  @media (max-width: 700px) {
    #wrap { flex-direction: column; gap: 10px; padding-top: 10px; }
    #sidebar { flex-direction: row; }
    #hint { max-width: 280px; }
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="book">
      <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/f0fc43a7-8aab-4a56-9615-34c15000f136.jpeg" /></div>
      <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/2bea4882-c211-4c01-8a9c-7f6b55eab5fa.jpeg" /></div>
      <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/c42f6304-2ba2-4251-b6f6-e86628cf1a6a.jpeg" /></div>
      <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/140d56d6-2037-4017-a732-791f43c659c9.jpeg" /></div>
      <div class="page"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/14b3a434-0d0a-4acb-b04b-fdf12a9ecb57.jpeg" /></div>
    </div>

    <div id="sidebar">
      <button id="prevBtn">‹ Prev</button>
      <button id="nextBtn">Next ›</button>
      <div class="divider"></div>
      <button id="fullscreenBtn" class="secondary">⛶ Fullscreen</button>
      <div id="hint">Drag a page edge, or use the buttons, to turn the page.</div>
      <div id="err"></div>
    </div>
  </div>

<script>
  let pageFlip = null;

  function computeSize() {
    const ratio = 673 / 520; // page aspect ratio (h/w)
    const sidebarReserve = window.innerWidth > 700 ? 170 : 0;
    const maxW = Math.min((window.innerWidth - sidebarReserve) * 0.92, 1000);
    const maxHReserve = window.innerWidth > 700 ? 40 : 140;
    const maxH = window.innerHeight - maxHReserve;
    let w = maxW;
    let h = w * ratio;
    if (h > maxH) {
      h = maxH;
      w = h / ratio;
    }
    return { width: Math.round(w), height: Math.round(h) };
  }

  let resizeDebounce = null;
  function applySize() {
    const { width, height } = computeSize();
    const bookEl = document.getElementById('book');
    bookEl.style.width = width + 'px';
    bookEl.style.height = height + 'px';
    if (pageFlip && pageFlip.updateFromHtml) {
      pageFlip.updateFromHtml(document.querySelectorAll('.page'));
    }
  }

  function initBook() {
    try {
      const { width, height } = computeSize();
      const bookEl = document.getElementById('book');
      bookEl.style.width = width + 'px';
      bookEl.style.height = height + 'px';

      pageFlip = new St.PageFlip(bookEl, {
        width,
        height,
        size: "fixed",
        minWidth: 280,
        maxWidth: 1200,
        minHeight: 360,
        maxHeight: 1500,
        showCover: false,
        usePortrait: true,
        maxShadowOpacity: 0.5,
        mobileScrollSupport: true,
        flippingTime: 700,
      });

      pageFlip.loadFromHTML(document.querySelectorAll('.page'));

      document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
      document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());

      // Debounced resize so fullscreen toggles / window resizing don't snap jarringly
      window.addEventListener('resize', () => {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(applySize, 120);
      });
    } catch (e) {
      document.getElementById('err').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  }

  const imgs = Array.from(document.querySelectorAll('.page img'));
  let loaded = 0;
  function checkAllLoaded() {
    loaded++;
    if (loaded >= imgs.length) initBook();
  }
  imgs.forEach((img) => {
    if (img.complete) {
      checkAllLoaded();
    } else {
      img.addEventListener('load', checkAllLoaded);
      img.addEventListener('error', checkAllLoaded);
    }
  });

  // Fullscreen toggle — resize is debounced above so this no longer causes a jarring snap
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(applySize, 120);
  });
</script>
</body>
</html>
