<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Accurate Forklift - Brochure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at center, #2b2b2b 0%, #0a0a0a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  #book { margin: 0 auto; }
  .page {
    background-color: white;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
    overflow: hidden;
    cursor: zoom-in;
  }
  .page img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    pointer-events: none;
  }
  #hint {
    color: #ddd; font-size: 14px; margin-top: 12px; letter-spacing: 0.5px; opacity: 0.85;
    text-align: center;
  }
  #controls {
    margin-top: 10px; display: flex; gap: 14px; align-items: center;
  }
  #err { color: #f66; font-size: 13px; margin-top: 10px; max-width: 500px; text-align: center; white-space: pre-wrap; }
  button {
    background: #E31E24; color: white; border: none; padding: 9px 20px;
    border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px;
    letter-spacing: 0.5px;
  }
  button:hover { background: #B0161B; }
  button.secondary { background: #333; }
  button.secondary:hover { background: #555; }

  /* Zoom lightbox for reading page text up close */
  #zoomOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92);
    align-items: center; justify-content: center;
    cursor: zoom-out;
    pointer-events: none; /* mouse keeps hovering the page underneath, not this overlay */
  }
  #zoomOverlay.active { display: flex; }
  #zoomOverlay img {
    max-width: 96vw; max-height: 96vh;
    object-fit: contain;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  #zoomOverlay .zoomHint {
    position: absolute; bottom: 18px; left: 0; right: 0;
    text-align: center; color: #ccc; font-size: 13px;
  }
</style>
</head>
<body>
  <div id="book">
    <div class="page" data-full="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/a4bd278a-07df-4476-8e74-ba6642ff293c.jpeg"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/a4bd278a-07df-4476-8e74-ba6642ff293c.jpeg" /></div>
    <div class="page" data-full="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/6b55e218-bb62-43bb-aad2-fb17ddf35a6c.jpeg"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/6b55e218-bb62-43bb-aad2-fb17ddf35a6c.jpeg" /></div>
    <div class="page" data-full="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/f2de269e-fe00-4f04-b8f3-d9ea995d0278.jpeg"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/f2de269e-fe00-4f04-b8f3-d9ea995d0278.jpeg" /></div>
    <div class="page" data-full="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/b860204d-6911-410e-945d-5fb4b645b818.jpeg"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/b860204d-6911-410e-945d-5fb4b645b818.jpeg" /></div>
    <div class="page" data-full="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/743f5997-ebc2-49e1-a1f0-d9812e9a69a5.jpeg"><img src="https://galaxy-prod.tlcdn.com/gen/user_2zjLopEy7F0lHwAkoTVfhQ1FSZl/743f5997-ebc2-49e1-a1f0-d9812e9a69a5.jpeg" /></div>
  </div>
  <div id="controls">
    <button id="prevBtn">‹ Prev</button>
    <button id="nextBtn">Next ›</button>
    <button id="fullscreenBtn" class="secondary">⛶ Fullscreen</button>
  </div>
  <div id="hint">Click/drag a page edge to turn it &nbsp;•&nbsp; Hover a page to zoom in and read (tap on mobile)</div>
  <div id="err"></div>

  <div id="zoomOverlay">
    <img id="zoomImg" src="" alt="Zoomed page" />
    <div class="zoomHint">Move away to close</div>
  </div>

<script>
  let pageFlip = null;
  const isTouchDevice = window.matchMedia('(hover: none)').matches || 'ontouchstart' in window;

  function computeSize() {
    const ratio = 673 / 520; // page aspect ratio (h/w)
    const maxW = Math.min(window.innerWidth * 0.94, 1000);
    const maxH = window.innerHeight * 0.80;
    let w = maxW;
    let h = w * ratio;
    if (h > maxH) {
      h = maxH;
      w = h / ratio;
    }
    return { width: Math.round(w), height: Math.round(h) };
  }

  function openZoom(full) {
    document.getElementById('zoomImg').src = full;
    document.getElementById('zoomOverlay').classList.add('active');
  }
  function closeZoom() {
    document.getElementById('zoomOverlay').classList.remove('active');
  }

  function initBook() {
    try {
      const { width, height } = computeSize();
      const bookEl = document.getElementById('book');
      bookEl.style.width = width + 'px';
      bookEl.style.height = height + 'px';

      pageFlip = new St.PageFlip(bookEl, {
        width,
        height,
        size: "fixed",
        minWidth: 280,
        maxWidth: 1200,
        minHeight: 360,
        maxHeight: 1500,
        showCover: false,
        usePortrait: true,
        maxShadowOpacity: 0.5,
        mobileScrollSupport: true,
        flippingTime: 700,
      });

      pageFlip.loadFromHTML(document.querySelectorAll('.page'));

      document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
      document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());

      // Recompute size on window resize / orientation change
      window.addEventListener('resize', () => {
        const { width, height } = computeSize();
        bookEl.style.width = width + 'px';
        bookEl.style.height = height + 'px';
        pageFlip.updateFromHtml
          ? pageFlip.updateFromHtml(document.querySelectorAll('.page'))
          : null;
      });

      // Zoom trigger: hover on desktop/mouse, tap-to-toggle on touch devices
      document.querySelectorAll('.page').forEach((pageEl) => {
        const full = pageEl.getAttribute('data-full');
        if (!full) return;

        if (isTouchDevice) {
          pageEl.addEventListener('click', (e) => {
            openZoom(full);
            e.stopPropagation();
          });
        } else {
          let hoverTimer = null;
          pageEl.addEventListener('mouseenter', () => {
            // small delay so a quick drag-to-flip gesture doesn't trigger zoom
            hoverTimer = setTimeout(() => openZoom(full), 180);
          });
          pageEl.addEventListener('mouseleave', () => {
            clearTimeout(hoverTimer);
            closeZoom();
          });
          pageEl.addEventListener('mousedown', () => {
            // dragging to flip the page should cancel the zoom
            clearTimeout(hoverTimer);
            closeZoom();
          });
        }
      });
    } catch (e) {
      document.getElementById('err').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  }

  const imgs = Array.from(document.querySelectorAll('.page img'));
  let loaded = 0;
  function checkAllLoaded() {
    loaded++;
    if (loaded >= imgs.length) initBook();
  }
  imgs.forEach((img) => {
    if (img.complete) {
      checkAllLoaded();
    } else {
      img.addEventListener('load', checkAllLoaded);
      img.addEventListener('error', checkAllLoaded);
    }
  });

  // Touch devices: tap anywhere on the overlay (or the page again) closes it
  if (isTouchDevice) {
    document.getElementById('zoomOverlay').style.pointerEvents = 'auto';
  }
  document.getElementById('zoomOverlay').addEventListener('click', closeZoom);

  // Fullscreen toggle
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => {
    window.dispatchEvent(new Event('resize'));
  });
</script>
</body>
</html>
